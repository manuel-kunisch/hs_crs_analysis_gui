site_name: HS-MOSAIC
site_description: GUI for seeded multivariate analysis of hyperspectral and multispectral microscopy data
repo_name: hs-mosaic

theme:
  name: readthedocs
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Essentials (must-know features): essentials.md
  - Standalone Windows .exe: standalone_windows.md
  - Full Python Installation: installation.md
  - Quickstart: quickstart.md
  - Concepts: concepts.md
  - Methods:
      - NNMF and NNLS modes: methods/nnmf_nnls_modes.md
  - Tutorials:
      - 00 GUI basics:
          - GUI and pyqtgraph basics: tutorials/00_gui_and_pyqtgraph_basics.md
          - Publication plots with Matplotlib rc defaults: tutorials/00a_publication_plots_matplotlibrc.md
      - 01 Data loading:
          - Loading 3D TIFF and 4D data: tutorials/01_loading_data.md
          - Spectral axis and channel labels: tutorials/01a_spectral_axis_and_channel_labels.md
          - Stitching tile folders: tutorials/01b_stitching_tile_folders.md
      - 02 Analysis:
          - Analysis modes: tutorials/02_analysis_modes.md
          - GPU acceleration: tutorials/02a_gpu_acceleration.md
      - 03 Seeds:
          - Seeds, spectra, and W maps: tutorials/03_seeds_spectral_and_spatial.md
          - Loading custom seed spectra: tutorials/03a_loading_custom_seed_spectra.md
          - ROI Manager in detail: tutorials/03b_roi_manager.md
          - Auto-suggested ROIs: tutorials/03c_suggest_rois.md
      - 04 Physical units and rolling-ball correction: tutorials/04_physical_units_and_rolling_ball.md
      - 05 Results and export: tutorials/05_results_and_export.md
      - 06 Presets and reproducibility: tutorials/06_presets_and_reproducibility.md
      - 07 Workflow checklist: tutorials/07_workflow_checklist.md
  - Examples:
      - Overview: examples/index.md
      - Synthetic quickstart: examples/synthetic_quickstart.md
      - Stitching and preprocessing (WIP): examples/stitching_and_preprocessing.md
      - CARS/SRS label-free data (WIP): examples/cars_srs_label_free.md
      - SWIR reflection data (WIP): examples/swir_reflection.md
      - 4D fluorescence unmixing (WIP): examples/fluorescence_4d_unmixing.md
  - Reference:
      - Spectral axis and wavelength.json: reference/spectral_axis_and_wavelength_json.md
      - ROI manager and seed types: reference/roi_manager_and_seed_types.md
      - Fiji export: reference/fiji_export.md
      - Presets: reference/presets.md
  - Troubleshooting: troubleshooting.md
  - Citation: citation.md
